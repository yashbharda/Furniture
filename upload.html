<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Images</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>

body{
    background:#0f172a;
    min-height:100vh;
    color:white;
}

.upload-wrapper{
    max-width:500px;
    margin:80px auto 30px;
}

.card{
    background:#6c757d;
    border:none;
    border-radius:20px;
}

.form-control,
.form-select{
    border-radius:12px;
}

.upload-btn{
    border-radius:12px;
    font-weight:600;
}

.home-btn{
    position:fixed;
    top:15px;
    left:15px;
    z-index:9999;
    border-radius:10px;
    font-weight:600;
}

#status{
    min-height:25px;
}

@media(max-width:576px){

    .upload-wrapper{
        margin-top:70px;
        padding:0 10px;
    }

    h2{
        font-size:1.5rem;
    }

}

</style>

</head>
<body>

<!-- Home Button -->

<a href="index.html" class="btn btn-warning home-btn">
    <i class="bi bi-arrow-left-circle-fill me-2"></i> Home
</a>

<div class="container">

    <div class="upload-wrapper">

        <div class="card shadow-lg">

            <div class="card-body p-4">

                <h2 class="text-warning text-center mb-4">
                    Upload Furniture Images
                </h2>

                <label class="mb-2">
                    Select Category
                </label>

                <select id="folder" class="form-select mb-3">
                    <option value="sofa">Sofa</option>
                    <option value="bedroom">Bedroom</option>
                    <option value="kitchen">Kitchen</option>
                    <option value="cupboard">Cupboard</option>
                    <option value="tvunit">TV Unit</option>
                </select>

                <label class="mb-2">
                    Choose Image
                </label>

                <input
                    type="file"
                    id="image"
                    class="form-control mb-3"
                    accept="image/*">

                <button
                    class="btn btn-warning w-100 upload-btn"
                    onclick="uploadImage()">

                    Upload Image

                </button>

                <h6
                    class="mt-4 text-center text-warning"
                    id="status">
                </h6>

            </div>

        </div>

    </div>

</div>

<script src="upload.js"></script>

</body>
</html>
