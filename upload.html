<!DOCTYPE html>
<html>
<head>
    <title>Upload Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    background:#0f172a !important;
}

.card{
    border-radius:20px;
}

.form-control,
.form-select{
    border-radius:12px;
}

.btn{
    border-radius:12px;
    font-weight:600;
}
</style>
</head>
<body class="bg-dark text-white">

<div class="container py-4">

    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-10 col-12">

            <div class="card bg-secondary border-0 shadow-lg">
                <div class="card-body p-4">

                    <h2 class="text-warning text-center mb-4">
                        Upload Furniture Images
                    </h2>

                    <label class="mb-2">Select Category</label>
                    <select id="folder" class="form-select mb-3">
                        <option value="sofa">Sofa</option>
                        <option value="bedroom">Bedroom</option>
                        <option value="kitchen">Kitchen</option>
                        <option value="cupboard">Cupboard</option>
                        <option value="tvunit">TV Unit</option>
                    </select>

                    <label class="mb-2">Choose Image</label>
                    <input type="file"
                           id="image"
                           class="form-control mb-3">

                    <button class="btn btn-warning w-100"
                            onclick="uploadImage()">
                        Upload Image
                    </button>

                    <h6 class="mt-4 text-center"
                        id="status">
                    </h6>

                </div>
            </div>

        </div>
    </div>

</div>

<script src="upload.js"></script>

</body>
</html>
