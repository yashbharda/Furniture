<!DOCTYPE html>
<html>
<head>
    <title>Upload Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container py-5">

    <h1 class="text-warning mb-4">Upload Furniture Images</h1>

    <select id="folder" class="form-select mb-3">
        <option value="sofa">Sofa</option>
        <option value="bedroom">Bedroom</option>
        <option value="kitchen">Kitchen</option>
        <option value="cupboard">Cupboard</option>
        <option value="tvunit">TV Unit</option>
    </select>

    <input type="file" id="image" class="form-control mb-3">

    <button class="btn btn-warning" onclick="uploadImage()">
        Upload
    </button>

    <h5 class="mt-4" id="status"></h5>

</div>

<script src="upload.js"></script>

</body>
</html>
